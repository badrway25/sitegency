    context: "Cuccioli, alimentazione, vaccinazioni"

  # --- inner page heroes (all use same image) ---
  - id: inner_hero_bg
    page: [about, services, groomer, blog, blog-single, pricing, contact]
    selector: ".hero-wrap.hero-wrap-2"
    attr: "style:background-image"
    size: "1920x800"
    context: "Veterinario / clinica"
    current_url: "https://images.pexels.com/photos/6235233/pexels-photo-6235233.jpeg"

  # --- groomer.html ---
