  - id: about_image
    page: [index, about]
    selector: ".ftco-counter .img.w-100"
    attr: "style:background-image"
    size: "800x600"
    context: "Veterinario che cura animale, ambiente clinico"
    current_url: "https://images.pexels.com/photos/6235241/pexels-photo-6235241.jpeg"

  - id: testimonials_bg
    page: [index, about]
    selector: ".testimony-section.img"
    attr: "style:background-image"
    size: "1920x800"
    context: "Animali domestici, sfondo caldo"
    current_url: "https://images.pexels.com/photos/1170986/pexels-photo-1170986.jpeg"

  - id: team_member_1-4
    page: [index, groomer]
    selector: ".staff .img"
    attr: "style:background-image"
    size: "400x500"
