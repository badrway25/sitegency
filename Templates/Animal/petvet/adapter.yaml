# ================================================================
# ADAPTER — Animal/petvet (ZampaCura)
# Template adapter for Sitegency marketplace customizer
# Created: 2026-04-09
# ================================================================

template:
  slug: petvet
  category: Animal
  original_name: "Petvet"
  brand_name: "ZampaCura"
  brand_tagline: "Centro Veterinario"
  brand_city: "Torino"
  locale: it
  framework: Bootstrap 4.5.0
  css_prefix: "zc-"
  pages_count: 8

# ================================================================
# BRAND POINTS — Where the brand name appears
# ================================================================
brand_points:
  - id: navbar_brand
    selector: "a.navbar-brand.zc-brand h1"
    pages: [index, about, groomer, services, blog, blog-single, pricing, contact]
    content: "Zampa<span class='zc-brand-accent'>Cura</span>"
    note: "Uses zc-brand class (safe from PreviewEngine). Text logo with accent span."

  - id: footer_brand
    selector: "h2.zc-footer-logo .logo1 span:first-child"
    pages: [index, about, groomer, services, blog, blog-single, pricing, contact]
    content: "ZampaCura"

  - id: footer_tagline_brand
    selector: "h2.zc-footer-logo .logo1 span.sub"
    pages: [index, about, groomer, services, blog, blog-single, pricing, contact]
    content: "Centro Veterinario"

  - id: page_title
    selector: "title"
    pages: [index, about, groomer, services, blog, blog-single, pricing, contact]
    pattern: "{PageName} — ZampaCura Centro Veterinario"

  - id: navbar_subtitle
    selector: "a.navbar-brand.zc-brand h1 span.mini"
    pages: [index, about, groomer, services, blog, blog-single, pricing, contact]
    content: "Centro Veterinario"

  - id: about_subheading
    selector: ".heading-section .subheading"
    pages: [index, about]
    content: "Benvenuti da ZampaCura"

  - id: footer_description
    selector: ".ftco-footer-widget p:first-of-type"
    pages: all
    content: "Centro veterinario di eccellenza a Torino..."

# ================================================================
# LOGO POINTS — Where a logo/mark would go
# ================================================================
logo_points:
  - id: navbar_logo
    selector: "a.navbar-brand.zc-brand"
    pages: all
    type: text_logo_with_icon
    note: "Flaticon stethoscope icon + text. To add image: insert <img> inside <a>, hide <h1> with CSS."

  - id: footer_logo
    selector: "h2.zc-footer-logo a"
    pages: all
    type: text_logo_with_icon
    note: "Same flaticon + text pattern. Could be replaced with image logo."

# ================================================================
# TEXT SLOTS — All editable text content
# ================================================================
text_slots:

  # --- index.html ---
  - id: hero_title
    page: index
    selector: ".hero-wrap .slider-text h1"
    default: "La Cura che i Tuoi Animali Meritano"

  - id: hero_subtitle
    page: index
    selector: ".hero-wrap .slider-text p"
    default: "Da oltre 20 anni ci prendiamo cura dei vostri amici a quattro zampe..."

  - id: hero_cta_primary
    page: index
    selector: ".hero-wrap .btn-primary"
    default: "Prenota una Visita"

  - id: hero_cta_phone
    page: index
    selector: ".hero-wrap .btn-secondary"
    default: "011 234 5678"

  - id: service_intro_1_name
    page: index
    selector: ".intro .services:nth-child(1) .heading"
    default: "Medicina Veterinaria"

  - id: service_intro_2_name
    page: index
    selector: ".intro .services:nth-child(2) .heading"
    default: "Toelettatura"

  - id: service_intro_3_name
    page: index
    selector: ".intro .services:nth-child(3) .heading"
    default: "Pensione & Asilo"

  - id: about_subheading
    page: index
    selector: ".ftco-counter .heading-section .subheading"
    default: "Benvenuti da ZampaCura"

  - id: about_heading
    page: index
    selector: ".ftco-counter .heading-section h2"
    default: "Il Centro Veterinario di Riferimento a Torino"

  - id: about_body
