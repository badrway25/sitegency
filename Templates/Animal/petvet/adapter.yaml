    page: contact
    selector: ".block-9 .img.w-100"
    attr: "style:background-image"
    size: "800x600"
    current_url: "https://images.pexels.com/photos/6235241/pexels-photo-6235241.jpeg"

# ================================================================
# EDITABLE SECTIONS — Major page sections
# ================================================================
editable_sections:

  - id: hero
    page: index
    selector: ".hero-wrap.js-fullheight"
    contains: [hero_bg, hero_title, hero_subtitle, hero_cta_primary, hero_cta_phone]

  - id: services_intro
    page: index
    selector: ".ftco-section.bg-light.ftco-no-pt.intro"
    contains: [service_intro_1_name, service_intro_2_name, service_intro_3_name]

  - id: about_section
    page: [index, about]
    selector: ".ftco-counter.img"
    contains: [about_subheading, about_heading, about_body, about_image]

  - id: appointment_form
    page: [index, services, groomer, pricing]
    selector: ".ftco-services-2"
    contains: [appointment_heading]

  - id: team_section
    page: [index, groomer]
    selector: ".bg-light:has(.staff)"
    contains: [team_heading, team_member_1-4]

  - id: testimonials
    page: [index, about]
    selector: ".testimony-section"
    contains: [testimonials_heading, testimonials_bg, testimonial_avatar_1-5]

  - id: pricing_section
    page: [index, pricing]
    selector: ".bg-light:has(.block-7)"
    contains: [pricing_heading, pricing_card_1-4]

  - id: blog_preview
    page: index
    selector: ".ftco-section.ftco-no-pt.bg-light:has(.blog-entry)"
    contains: [blog_heading, blog_card_1-3]

  - id: counters
    page: about
    selector: ".ftco-facts"
    contains: [about_counter_1, about_counter_2, about_counter_3, about_counter_4]

  - id: services_grid
    page: services
    selector: ".ftco-section.bg-light:has(.services)"
    contains: [service_1_name, service_2_name, service_3_name, service_4_name, service_5_name, service_6_name, service_7_name]

  - id: contact_info
    page: contact
    selector: ".contact-section"
    contains: [contact_address, contact_phone, contact_email, contact_website]

  - id: footer
    page: all
    selector: ".ftco-footer"
    contains: [footer_tagline, footer_address, footer_phone, footer_email]

# ================================================================
# RISKY SELECTORS — PreviewEngine conflict zones
# ================================================================
risky_selectors:
  - selector: ".navbar-brand"
    risk: "Engine targets this for brand injection"
    mitigation: "Added zc-brand class, brand styling in petvet-shared.css with 7x selectors"

  - selector: ".btn-primary"
    risk: "Engine injects pill shape and link color override"
    mitigation: "7x repeated selector override in petvet-shared.css"

  - selector: ".btn-secondary"
    risk: "Engine may override button styling"
    mitigation: "7x repeated selector override in petvet-shared.css"

  - selector: "h2.logo"
    risk: "Engine may target .logo class for brand injection"
    mitigation: "Added zc-footer-logo class, styled in petvet-shared.css"

  - selector: "strong.number[data-number]"
    risk: "Counter elements — engine content pool may replace text"
    mitigation: "Monitor in preview. Counter values in data-number attribute, not text."

  - selector: "background-image: url(images/*)"
    risk: "Engine replaces ALL local image URLs"
    mitigation: "All critical images replaced with direct Pexels https:// URLs"

  - selector: "input[type='submit']"
    risk: "Engine pill shape on submit buttons"
    mitigation: "7x selector override in petvet-shared.css"

  - selector: "#map"
    risk: "Google Maps API key — will not work in preview"
    mitigation: "Accept: map will be blank in preview. Not critical."

  - selector: ".ftco-heading-2"
    risk: "Footer headings — engine may attempt text replacement"
    mitigation: "Low risk, monitor"

# ================================================================
# PREVIEWENGINE CONFLICTS — Known issues
# ================================================================
previewengine_conflicts:
  - issue: "Stellar.js parallax causes scroll jank"
    status: "FIXED — disabled in main.js, data-stellar attributes removed from all HTML"

  - issue: "Scrollax causes additional scroll overhead"
    status: "FIXED — $.Scrollax() commented out in main.js"

  - issue: "$(window).scroll() not throttled"
    status: "KNOWN — navbar scroll handler fires on every pixel. Low impact."

  - issue: "Google Maps API key hardcoded"
    status: "KNOWN — map will be blank in preview. Acceptable."

  - issue: "Bootstrap Datepicker + Timepicker may conflict with engine injected styles"
    status: "LOW RISK — form elements in appointment section"

# ================================================================
# NOTES FOR CUSTOMIZER
# ================================================================
notes_for_customizer:
  css_override_file: "css/petvet-shared.css"
  css_prefix: "zc-"
  safe_brand_classes: ["zc-brand", "zc-brand-accent", "zc-footer-logo"]
  unsafe_classes: ["logo", "brand", "site-title", "brand-name", "subtitle", "tagline"]
  font_dependencies:
    - "DM Sans (body) — loaded via @import in petvet-shared.css"
    - "Lora (headings) — loaded via @import in petvet-shared.css"
  js_plugins:
    - "Owl Carousel — testimonials carousel"
    - "jQuery animateNumber — counter animations (about page)"
    - "jQuery Waypoints — scroll-triggered animations (.ftco-animate)"
    - "Magnific Popup — image/video lightbox"
    - "Bootstrap Datepicker — appointment form date picker"
    - "jQuery Timepicker — appointment form time picker"
    - "Google Maps — contact page (requires API key)"
  disabled_plugins:
    - "jQuery Stellar — parallax DISABLED (jank prevention)"
    - "Scrollax — scroll effects DISABLED (jank prevention)"
  known_limitations:
    - "Google Maps requires valid API key — blank in preview"
    - "Counter text may be replaced by engine content pool"
    - "Owl Carousel nav hidden by default, dots visible"
    - "Font Awesome 4.7 — no FA5/6 icons"
    - "Flaticon custom font — pet-specific icons only"
  image_strategy: "All critical images use direct Pexels URLs to bypass PreviewEngine replacement"
  color_primary: "#2d6a4f"
  color_accent: "#e9c46a"
  color_dark: "#1b2a1f"

# ================================================================
# PAGES
# ================================================================
pages:
  - file: index.html
    title: "Home"
    sections: [hero, services_intro, about_section, appointment_form, team_section, testimonials, pricing_section, blog_preview, footer]

  - file: about.html
    title: "Chi Siamo"
    sections: [hero_banner, about_section, counters, testimonials, footer]

  - file: services.html
    title: "Servizi"
    sections: [hero_banner, appointment_form, services_grid, footer]

  - file: groomer.html
    title: "Il Team"
    sections: [hero_banner, appointment_form, team_section, footer]

  - file: blog.html
    title: "Blog"
    sections: [hero_banner, blog_grid, pagination, footer]

  - file: blog-single.html
    title: "Articolo"
    sections: [hero_banner, article, sidebar, comments, footer]

  - file: pricing.html
    title: "Tariffe"
    sections: [hero_banner, appointment_form, pricing_section, footer]

  - file: contact.html
    title: "Contatti"
    sections: [hero_banner, contact_info, contact_form, map, footer]
