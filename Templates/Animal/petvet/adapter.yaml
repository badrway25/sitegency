  # (staff 2-8 follow same pattern)

  # --- blog.html ---
  - id: blog_hero_title
    page: blog
    selector: ".bread"
    default: "Il Nostro Blog"

  # --- blog-single.html ---
  - id: blogsingle_hero_title
    page: blog-single
    selector: ".bread"
    default: "Articolo"

  - id: blogsingle_article_title
    page: blog-single
    selector: ".ftco-section h2.mb-3"
    default: "Come Preparare il Tuo Cucciolo alla Prima Visita Veterinaria"

  # --- pricing.html ---
  - id: pricing_hero_title
    page: pricing
    selector: ".bread"
    default: "Tariffe"

  # --- contact.html ---
  - id: contact_hero_title
    page: contact
    selector: ".bread"
    default: "Contatti"

  - id: contact_address
    page: contact
