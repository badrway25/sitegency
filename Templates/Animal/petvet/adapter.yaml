    selector: ".bread"
    default: "I Nostri Servizi"

  - id: service_1_name
    page: services
    selector: ".services:nth-child(1) .heading"
    default: "Medicina Veterinaria"

  - id: service_2_name
    page: services
    selector: ".services:nth-child(2) .heading"
    default: "Toelettatura Professionale"

  - id: service_3_name
    page: services
    selector: ".services:nth-child(3) .heading"
    default: "Pensione & Asilo"

  - id: service_4_name
    page: services
    selector: ".services:nth-child(4) .heading"
    default: "Chirurgia Veterinaria"

  - id: service_5_name
    page: services
    selector: ".services:nth-child(5) .heading"
    default: "Vaccinazioni"

  - id: service_6_name
    page: services
    selector: ".services:nth-child(6) .heading"
    default: "Dermatologia"

  - id: service_7_name
    page: services
    selector: ".services:nth-child(7) .heading"
    default: "Ecografia & Diagnostica"

  # --- groomer.html ---
  - id: groomer_hero_title
    page: groomer
    selector: ".bread"
    default: "Il Nostro Team"

  - id: staff_1_name
    page: groomer
    selector: ".staff:nth-child(1) h3"
    default: "Dott. Marco Rossi"

  - id: staff_1_role
    page: groomer
    selector: ".staff:nth-child(1) .position"
