    selector: ".heading-section .subheading:contains('Tariffe')"
    default: "Tariffe"

  - id: pricing_heading
    page: [index, pricing]
    selector: ".heading-section h2:contains('Pacchetti')"
    default: "I Nostri Pacchetti"

  - id: blog_subheading
    page: index
    selector: ".heading-section .subheading:contains('Blog')"
    default: "Dal Blog"

  - id: blog_heading
    page: index
    selector: ".heading-section h2:contains('Consigli')"
    default: "Consigli per i Tuoi Animali"

  # --- about.html ---
  - id: about_hero_title
