    default: "Il nostro centro offre un approccio integrato alla salute animale..."

  - id: about_list_1
    page: index
    selector: ".list-services li:nth-child(1) p"
    default: "Veterinari Specializzati"

  - id: about_list_2
    page: index
    selector: ".list-services li:nth-child(2) p"
    default: "Oltre 20 Anni di Esperienza"

  - id: about_list_3
    page: index
    selector: ".list-services li:nth-child(3) p"
    default: "Approccio Empatico"

  - id: about_list_4
    page: index
    selector: ".list-services li:nth-child(4) p"
    default: "Tecnologie All'Avanguardia"

  - id: appointment_heading
    page: [index, services, groomer, pricing]
    selector: ".appointment-heading"
    default: "Prenota un Appuntamento"

  - id: team_subheading
    page: [index, groomer]
    selector: ".bg-light .heading-section .subheading"
    default: "Il Nostro Team"

  - id: team_heading
    page: [index, groomer]
    selector: ".bg-light .heading-section h2"
    default: "I Nostri Veterinari"

  - id: testimonials_subheading
    page: [index, about]
    selector: ".testimony-section .heading-section-white .subheading"
    default: "Testimonianze"

  - id: testimonials_heading
    page: [index, about]
    selector: ".testimony-section .heading-section-white h2"
    default: "Cosa Dicono i Nostri Clienti"

  - id: pricing_subheading
