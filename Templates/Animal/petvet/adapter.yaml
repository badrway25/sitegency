    attr: "style:background-image"
    size: "100x100"
    count: 5
    context: "Ritratti clienti"

  - id: pricing_card_1-4
    page: [index, pricing]
    selector: ".block-7 .img"
    attr: "style:background-image"
    size: "400x200"
    count: 4
