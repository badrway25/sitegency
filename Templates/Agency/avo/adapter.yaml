# ================================================================
# ADAPTER — Agency/avo (Nøva Creative)
# Template adapter for Sitegency marketplace customizer
# Created: 2026-04-09
# ================================================================

template:
  slug: avo
  category: Agency
  original_name: "Avo"
  brand_name: "Nøva Creative"
  brand_tagline: "Agenzia Creativa Digitale"
  locale: it
  framework: Bootstrap 4.5.0
  css_prefix: "av-"

# ================================================================
# BRAND POINTS — Where the brand name appears
# ================================================================
brand_points:
  - id: navbar_brand
    selector: "a.navbar-brand.av-brand"
    pages: [index, about, work, blog, blog-single, contact]
    content: "Nøva"
    note: "Uses av-brand class (safe from PreviewEngine). <span class='av-brand-accent'> wraps the ø"

  - id: footer_brand
    selector: ".ftco-footer-widget .ftco-heading-2:first-child"
    pages: [index, about, work, blog, blog-single, contact]
    content: "Nøva Creative"

  - id: page_title
    selector: "title"
    pages: [index, about, work, blog, blog-single, contact]
    pattern: "{PageName} — Nøva Creative"

  - id: hero_about_heading
    selector: ".wrap-about .text h3"
    pages: [index, about]
    content: "Contains brand name in heading text"

  - id: testimonials_text
    selector: ".testimony-wrap .text p"
    pages: [index, about]
    content: "Brand mentioned in client quotes"

# ================================================================
# LOGO POINTS — Where a logo/mark would go
# ================================================================
logo_points:
  - id: navbar_logo
    selector: "a.navbar-brand.av-brand"
    pages: [index, about, work, blog, blog-single, contact]
    type: text_logo
    note: "Currently text-only. To add image logo: insert <img> inside the <a> and hide text with CSS"

  - id: footer_logo
    selector: ".ftco-footer-widget .ftco-heading-2:first-child"
    pages: [index, about, work, blog, blog-single, contact]
    type: text_logo
    note: "Text brand in footer. Could be replaced with image logo"

