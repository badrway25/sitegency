# ================================================================
# EDITABLE SECTIONS — Major page sections
# ================================================================
editable_sections:

  - id: hero_slider
    page: index
    selector: ".hero-wrap.degree-right"
    contains: [hero_slide1_bg, hero_slide1_title, hero_slide1_cta, hero_slide2_bg, hero_slide2_title, hero_slide2_cta]

  - id: services_grid
    page: index
    selector: ".ftco-section:first-of-type .row:has(.services)"
    contains: [service_1_name, service_2_name, service_3_name, service_4_name, service_5_name]

  - id: about_section
    page: index
    selector: ".wrap-about"
    contains: [about_heading, about_body, about_image]

  - id: process_steps
    page: index
    selector: ".row:has(.services-2)"
    contains: [step_1_title, step_2_title, step_3_title]

  - id: portfolio_grid
    page: index
    selector: ".ftco-portfolio"
    contains: [portfolio_heading, portfolio_1_image, portfolio_2_image, portfolio_3_image]

  - id: testimonials
    page: [index, about]
    selector: ".testimony-section"
    contains: [testimonials_heading, testimonial_avatar_1-5]

  - id: cta_band
    page: [index, about]
    selector: ".intro"
    contains: [cta_band_label, cta_band_heading, cta_band_bg]

  - id: blog_preview
    page: index
    selector: ".ftco-section.bg-light:has(.blog-entry)"
    contains: [blog_heading, blog_card_1-4_image]

  - id: team_section
    page: about
    selector: ".ftco-section.bg-light:has(.staff)"
    contains: [about_team_heading, team_member_1-8]

  - id: contact_form
    page: contact
    selector: ".contact-section"
    contains: [contact_heading, contact_subheading]

  - id: footer
    page: all
    selector: ".ftco-footer"
    contains: [footer_tagline, footer_address, footer_phone, footer_email]

# ================================================================
# RISKY SELECTORS — PreviewEngine conflict zones
# ================================================================
risky_selectors:
  - selector: ".navbar-brand"
    risk: "Engine targets this for brand injection"
    mitigation: "Added av-brand class, brand styling in avo-shared.css"

  - selector: ".btn-primary"
    risk: "Engine injects pill shape (border-radius: 999px) and link color override"
    mitigation: "7x repeated selector override in avo-shared.css"

  - selector: ".custom-btn"
    risk: "May get link color override from engine"
    mitigation: "7x repeated selector override in avo-shared.css"

  - selector: "h4.number[data-number]"
    risk: "Counter elements — engine content pool may replace text, causing NaN in animateNumber"
    mitigation: "Monitor in preview. If NaN appears, add counter class to skip list"

  - selector: "background-image: url(images/*)"
    risk: "Engine replaces ALL local image URLs"
    mitigation: "Replaced with direct Pexels https:// URLs — engine skips external URLs"

  - selector: "input[type='submit']"
    risk: "Engine pill shape on <button> and submit inputs"
    mitigation: "7x selector override for .btn-primary in avo-shared.css"

  - selector: "#map"
    risk: "Google Maps API key — may not work in preview"
    mitigation: "Accept: map may be blank in preview. Not critical."

  - selector: ".ftco-heading-2"
    risk: "Footer headings — engine may attempt text replacement"
    mitigation: "Low risk, monitor"

# ================================================================
# NOTES FOR CUSTOMIZER
# ================================================================
notes_for_customizer:
  css_override_file: "css/avo-shared.css"
  css_prefix: "av-"
  safe_brand_classes: ["av-brand", "av-brand-accent"]
  unsafe_classes: ["logo", "brand", "site-title", "brand-name", "subtitle", "tagline"]
  font_dependencies:
    - "Sora (headings) — loaded via @import in avo-shared.css"
    - "Inter (body) — loaded via @import in avo-shared.css"
  js_plugins:
    - "Owl Carousel — hero slider + testimonials"
    - "jQuery animateNumber — hero counters"
    - "jQuery Stellar — parallax on inner page heroes"
    - "Magnific Popup — video lightbox"
    - "Scrollax — scroll effects"
  known_limitations:
    - "Google Maps requires valid API key — blank in preview"
    - "Hero counter text may be replaced by content pool"
    - "Owl Carousel navigation hidden by default, shows on hover"
    - "Font Awesome 4.7 — no FA5/6 icons available"
  image_strategy: "All images use direct Pexels URLs to bypass PreviewEngine replacement"
  color_accent: "#e94560"
  color_primary: "#1a1a2e"

# ================================================================
# PAGES
# ================================================================
pages:
  - file: index.html
    title: "Home"
    sections: [hero_slider, services_grid, about_section, process_steps, portfolio_grid, testimonials, cta_band, blog_preview, footer]

  - file: about.html
    title: "Chi Siamo"
    sections: [hero_banner, services_grid, about_section, process_steps, cta_band, team_section, testimonials, footer]

  - file: work.html
    title: "Portfolio"
    sections: [hero_banner, portfolio_grid, pagination, footer]

  - file: blog.html
    title: "Blog"
    sections: [hero_banner, blog_grid, pagination, footer]

  - file: blog-single.html
    title: "Articolo"
    sections: [hero_banner, article, sidebar, comments, footer]

  - file: contact.html
    title: "Contatti"
    sections: [hero_banner, contact_form, contact_info, map, footer]
